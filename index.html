<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e222a" />

    <!-- iOS PWA (关键：让 iPhone 全屏打开) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="特勤局" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preload" as="image" href="/assets/icons.webp" />
    <title>云端特勤局学院</title>
    <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "8891a17474af492a91e56fad9cc7368b"}'></script><!-- End Cloudflare Web Analytics -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').then(function(reg) {
            reg.addEventListener('updatefound', function() {
              var newSW = reg.installing;
              newSW.addEventListener('statechange', function() {
                if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                  window.location.reload();
                }
              });
            });
          });
        });
      }
    </script>
  </body>
</html>
